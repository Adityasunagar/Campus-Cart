{% extends 'base.html' %}

{% block title %}Admin Portal — Campus Cart{% endblock %}

{% block content %}
<section class="section form-section">
  <div class="card card-form" style="max-width: 480px;">
    <h2>Admin Portal</h2>
    <p style="color:var(--clr-muted); margin-bottom: 2rem;">Authorized Personnel Only</p>
    <form method="post">
      <div class="field-group">
        <label for="email">Admin Email</label>
        <input id="email" name="email" type="email" class="input" placeholder="admin@example.com" required>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <div style="position: relative;">
          <input id="password" name="password" type="password" class="input" placeholder="••••••••" required>
          <span class="password-toggle" onclick="togglePassword('password', this)" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--clr-muted);">
            <!-- Eye SVG -->
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </span>
        </div>
      </div>
      <button class="btn btn-danger" type="submit" style="width: 100%; margin-top: 1rem;">Authenticate</button>
    </form>
  </div>
</section>

<script>
function togglePassword(inputId, toggleSpan) {
  const input = document.getElementById(inputId);
  const openEye = toggleSpan.querySelector('.eye-open');
  const closedEye = toggleSpan.querySelector('.eye-closed');
  if (input.type === 'password') {
    input.type = 'text';
    openEye.style.display = 'none';
    closedEye.style.display = 'block';
  } else {
    input.type = 'password';
    openEye.style.display = 'block';
    closedEye.style.display = 'none';
  }
}
</script>
{% endblock %}
