{% extends 'base.html' %}

{% block title %}Login — Campus Cart{% endblock %}

{% block content %}
<section class="section form-section">
  <div class="card card-form">
    <h2>Log in</h2>
    <form method="post">
      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" class="input" placeholder="you@example.com" required>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <div style="position: relative; display: flex; flex-direction: column;">
          <div style="display: flex; align-items: center; position: relative;">
            <input id="password" name="password" type="password" class="input" placeholder="Enter your password" required style="width: 100%; padding-right: 40px;">
            <button type="button" onclick="togglePassword('password', 'eye-login')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center;">
              <svg id="eye-login" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <a href="{{ url_for('auth.forgot_password') }}" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--clr-primary); text-decoration: none; align-self: flex-end;">Forgot password?</a>
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <p class="form-note">New to Campus Cart? <a href="{{ url_for('auth.register') }}">Create an account</a>.</p>
  </div>
</section>

<script>
function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  }
}
</script>
{% endblock %}
