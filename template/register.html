{% extends 'base.html' %}

{% block title %}Register — Campus Cart{% endblock %}

{% block content %}
<section class="section form-section">
  <div class="card card-form">
    <h2>Create an account</h2>
    <form method="post">
      <div class="field-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" class="input" placeholder="Your display name" required>
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" class="input" placeholder="you@example.com" required>
      </div>
      <div class="field-group">
        <label for="phone_number">Phone Number</label>
        <input id="phone_number" name="phone_number" type="tel" pattern="[0-9]{10}" class="input" placeholder="10-digit phone number" required>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <div style="position: relative;">
          <input id="password" name="password" type="password" class="input" placeholder="Create a password" required style="width: 100%; padding-right: 40px;">
          <button type="button" onclick="togglePassword('password', 'eye-reg1')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center;">
            <svg id="eye-reg1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div class="field-group">
        <label for="confirm">Confirm password</label>
        <div style="position: relative;">
          <input id="confirm" name="confirm" type="password" class="input" placeholder="Repeat your password" required style="width: 100%; padding-right: 40px;">
          <button type="button" onclick="togglePassword('confirm', 'eye-reg2')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center;">
            <svg id="eye-reg2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Register</button>
    </form>
    <p class="form-note">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>.</p>
  </div>
</section>

<script>
function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  }
}
</script>
{% endblock %}
